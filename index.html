<!DOCTYPE html>

<body>
<div id="root">
    <div class="app-header">
        <i class="fas fa-utensils"></i>
        <h1>Laura Girls Food</h1>
        <span class="location-badge">
            <i class="fas fa-map-marker-alt"></i> Kasama
        </span>
        <span class="badge"><i class="fas fa-motorcycle"></i> delivery</span>
        <button class="admin-login-btn" id="adminToggleBtn" onclick="toggleAdminLogin()">
            <i class="fas fa-user-shield"></i> Admin
        </button>
        <span class="admin-header-badge" id="adminBadge">👑 Admin</span>
    </div>
    <div id="app-container" class="app-body">
        <div class="loading" id="loadingDiv">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading delicious food from Kasama...</p>
            <div class="status-box" id="statusBox">⏳ Initializing...</div>
        </div>
    </div>
    <div class="footnote">
        <i class="fas fa-shield-alt"></i> Cash on delivery · Serving Kasama District, Northern Province, Zambia
    </div>
</div>

<!-- Admin Login Modal -->
<div class="admin-login-modal" id="adminModal">
    <div class="admin-login-box">
        <h2><i class="fas fa-user-shield"></i> Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Enter admin password" onkeypress="if(event.key==='Enter') adminLogin()" />
        <button onclick="adminLogin()">Login</button>
        <div class="error" id="loginError">❌ Incorrect password. Please try again.</div>
        <div style="margin-top:12px;text-align:center;font-size:12px;color:#999;">
            <i class="fas fa-info-circle"></i> Default password: <strong>admin123</strong>
        </div>
        <button onclick="closeAdminModal()" style="margin-top:10px;background:#999;width:100%;padding:10px;border:none;border-radius:12px;color:white;font-weight:600;cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    // ============================================
    // SUPABASE CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://ndwoqlxtaczwxsescemu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kd29xbHh0YWN6d3hzZXNjZW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5Mjk2MTQsImV4cCI6MjA5ODUwNTYxNH0.43PgLQSdEESXboLGrdtZCHq-f8TwzItXaGuxmI4NEe8';

    const ADMIN_PASSWORD = 'admin123';

    let isAdmin = false;
    let supabaseClient = null;
    let dashboardData = null;
    let map = null;
    let mapMarker = null;

    const container = document.getElementById('app-container');
    const loadingDiv = document.getElementById('loadingDiv');
    const statusBox = document.getElementById('statusBox');

    function updateStatus(message) {
        console.log(message);
        if (statusBox) {
            statusBox.textContent = message;
        }
    }

    updateStatus('🚀 App starting... Kasama, Zambia');

    // ============================================
    // MAP FUNCTIONS (OpenStreetMap - No API Key Needed)
    // ============================================
    function initMap(location) {
        try {
            const mapContainer = document.getElementById('map');
            if (!mapContainer) return;

            // Use Nominatim to geocode the location
            const geocodeUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}&limit=1`;
            
            fetch(geocodeUrl)
                .then(response => response.json())
                .then(data => {
                    let lat = -10.2129; // Kasama default
                    let lng = 31.1809;
                    
                    if (data && data.length > 0) {
                        lat = parseFloat(data[0].lat);
                        lng = parseFloat(data[0].lon);
                    }
                    
                    // Initialize map
                    if (map) {
                        map.remove();
                    }
                    
                    map = L.map('map').setView([lat, lng], 14);
                    
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                    }).addTo(map);
                    
                    // Add marker
                    const markerIcon = L.divIcon({
                        html: '<i class="fas fa-map-marker-alt" style="color:#cc0000;font-size:30px;"></i>',
                        className: 'custom-marker',
                        iconSize: [30, 30],
                        iconAnchor: [15, 30]
                    });
                    
                    mapMarker = L.marker([lat, lng], { icon: markerIcon }).addTo(map);
                    mapMarker.bindPopup(`<strong>📍 ${location}</strong>`).openPopup();
                    
                    // Hide loading
                    document.getElementById('mapLoading')?.style.setProperty('display', 'none');
                })
                .catch(error => {
                    console.error('Geocoding error:', error);
                    // Fallback to Kasama
                    showFallbackMap();
                });
        } catch (error) {
            console.error('Map error:', error);
            showFallbackMap();
        }
    }

    function showFallbackMap() {
        const mapContainer = document.getElementById('map');
        if (!mapContainer) return;
        
        if (map) {
            map.remove();
        }
        
        map = L.map('map').setView([-10.2129, 31.1809], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        
        const markerIcon = L.divIcon({
            html: '<i class="fas fa-map-marker-alt" style="color:#cc0000;font-size:30px;"></i>',
            className: 'custom-marker',
            iconSize: [30, 30],
            iconAnchor: [15, 30]
        });
        
        mapMarker = L.marker([-10.2129, 31.1809], { icon: markerIcon }).addTo(map);
        mapMarker.bindPopup('📍 Kasama, Zambia').openPopup();
        
        document.getElementById('mapLoading')?.style.setProperty('display', 'none');
    }

    function updateMapLocation(location) {
        if (!location) return;
        
        const geocodeUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}&limit=1`;
        
        fetch(geocodeUrl)
            .then(response => response.json())
            .then(data => {
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lng = parseFloat(data[0].lon);
                    
                    if (map) {
                        map.setView([lat, lng], 14);
                        if (mapMarker) {
                            mapMarker.setLatLng([lat, lng]);
                            mapMarker.bindPopup(`<strong>📍 ${location}</strong>`).openPopup();
                        }
                    }
                }
            })
            .catch(error => console.error('Geocoding error:', error));
    }

    // ============================================
    // ADMIN FUNCTIONS
    // ============================================
    window.toggleAdminLogin = function() {
        if (isAdmin) {
            isAdmin = false;
            document.getElementById('adminBadge').classList.remove('show');
            document.getElementById('adminToggleBtn').innerHTML = '<i class="fas fa-user-shield"></i> Admin';
            document.querySelector('.admin-panel')?.classList.remove('show');
            localStorage.removeItem('adminLoggedIn');
            alert('👋 Logged out from admin panel');
        } else {
            document.getElementById('adminModal').classList.add('show');
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('adminPassword').focus();
        }
    };

    window.adminLogin = function() {
        const password = document.getElementById('adminPassword').value;
        if (password === ADMIN_PASSWORD) {
            isAdmin = true;
            localStorage.setItem('adminLoggedIn', 'true');
            document.getElementById('adminModal').classList.remove('show');
            document.getElementById('adminBadge').classList.add('show');
            document.getElementById('adminToggleBtn').innerHTML = '<i class="fas fa-sign-out-alt"></i> Logout';
            document.querySelector('.admin-panel')?.classList.add('show');
            alert('✅ Welcome Admin! Loading dashboard...');
            loadDashboard();
        } else {
            document.getElementById('loginError').classList.add('show');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminPassword').focus();
        }
    };

    window.closeAdminModal = function() {
        document.getElementById('adminModal').classList.remove('show');
    };

    function checkAdminSession() {
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            isAdmin = true;
            document.getElementById('adminBadge').classList.add('show');
            document.getElementById('adminToggleBtn').innerHTML = '<i class="fas fa-sign-out-alt"></i> Logout';
            document.querySelector('.admin-panel')?.classList.add('show');
        }
    }

    document.getElementById('adminModal')?.addEventListener('click', function(e) {
        if (e.target === this) {
            closeAdminModal();
        }
    });

    // ============================================
    // DASHBOARD FUNCTIONS
    // ============================================
    async function loadDashboard() {
        if (!supabaseClient) return;
        
        try {
            updateStatus('📊 Loading admin dashboard...');
            
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekAgoStr = weekAgo.toISOString();
            
            const { data: orders, error: ordersError } = await supabaseClient
                .from('orders')
                .select('*')
                .gte('created_at', weekAgoStr)
                .order('created_at', { ascending: false });
            
            if (ordersError) throw ordersError;
            
            const { data: deliveries, error: deliveriesError } = await supabaseClient
                .from('delivery_records')
                .select('*')
                .gte('created_at', weekAgoStr);
            
            if (deliveriesError) throw deliveriesError;
            
            const totalOrders = orders?.length || 0;
            const totalRevenue = orders?.reduce((sum, o) => sum + (o.total || 0), 0) || 0;
            const completedOrders = orders?.filter(o => o.status === 'delivered').length || 0;
            const pendingOrders = orders?.filter(o => o.status === 'pending' || o.status === 'preparing').length || 0;
            
            const girlStats = {};
            deliveries?.forEach(d => {
                const name = d.delivery_girl_name || 'Unknown';
                if (!girlStats[name]) {
                    girlStats[name] = { deliveries: 0, revenue: 0 };
                }
                girlStats[name].deliveries += 1;
                const order = orders?.find(o => o.id === d.order_id);
                if (order) {
                    girlStats[name].revenue += order.total || 0;
                }
            });
            
            dashboardData = {
                totalOrders,
                totalRevenue,
                completedOrders,
                pendingOrders,
                orders: orders || [],
                deliveries: deliveries || [],
                girlStats
            };
            
            renderDashboard();
            updateStatus('✅ Dashboard loaded!');
            
        } catch (error) {
            console.error('❌ Dashboard error:', error);
            updateStatus('❌ Error loading dashboard: ' + error.message);
        }
    }

    function renderDashboard() {
        if (!dashboardData) return;
        
        const { totalOrders, totalRevenue, completedOrders, pendingOrders, orders, girlStats } = dashboardData;
        const adminPanel = document.querySelector('.admin-panel');
        if (!adminPanel) return;
        
        let girlStatsHTML = '';
        const sortedGirls = Object.entries(girlStats).sort((a, b) => b[1].deliveries - a[1].deliveries);
        if (sortedGirls.length === 0) {
            girlStatsHTML = '<div style="color:#7a6e86;padding:10px 0;">No delivery records yet</div>';
        } else {
            sortedGirls.forEach(([name, stats]) => {
                girlStatsHTML += `
                    <div class="girl-stat">
                        <span><i class="fas fa-female" style="color:#cc0000;"></i> ${name}</span>
                        <span>
                            <span class="count">${stats.deliveries}</span> deliveries · 
                            <span class="revenue">ZMW ${stats.revenue.toFixed(2)}</span>
                        </span>
                    </div>
                `;
            });
        }
        
        let ordersHTML = '';
        const recentOrders = orders.slice(0, 20);
        if (recentOrders.length === 0) {
            ordersHTML = '<div style="color:#7a6e86;padding:10px 0;">No orders this week</div>';
        } else {
            recentOrders.forEach(order => {
                const statusClass = order.status || 'pending';
                const date = new Date(order.created_at).toLocaleDateString();
                const time = new Date(order.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                ordersHTML += `
                    <div class="order-item">
                        <div>
                            <div>${date} ${time}</div>
                            <div style="font-size:11px;color:#999;">${order.customer_location || 'Kasama'}</div>
                        </div>
                        <div style="text-align:right;">
                            <div><strong>ZMW ${(order.total || 0).toFixed(2)}</strong></div>
                            <span class="status-badge ${statusClass}">${statusClass.toUpperCase()}</span>
                        </div>
                    </div>
                `;
            });
        }
        
        adminPanel.innerHTML = `
            <div class="section-title">
                <i class="fas fa-chart-line"></i> Admin Dashboard
                <span style="font-size:11px;font-weight:400;color:#6d6a7a;margin-left:auto;">
                    <i class="fas fa-sync"></i> Live
                </span>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card total">
                    <div class="icon"><i class="fas fa-credit-card"></i></div>
                    <div class="number">ZMW ${totalRevenue.toFixed(2)}</div>
                    <div class="label">Total Revenue (This Week)</div>
                </div>
                <div class="stat-card">
                    <div class="icon"><i class="fas fa-shopping-bag"></i></div>
                    <div class="number">${totalOrders}</div>
                    <div class="label">Total Orders</div>
                </div>
                <div class="stat-card">
                    <div class="icon"><i class="fas fa-check-circle"></i></div>
                    <div class="number">${completedOrders}</div>
                    <div class="label">Completed</div>
                </div>
                <div class="stat-card">
                    <div class="icon"><i class="fas fa-clock"></i></div>
                    <div class="number">${pendingOrders}</div>
                    <div class="label">Pending</div>
                </div>
            </div>
            
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('orders')"><i class="fas fa-list"></i> Orders</button>
                <button class="tab-btn" onclick="switchTab('delivery')"><i class="fas fa-motorcycle"></i> Delivery Girls</button>
            </div>
            
            <div id="tab-orders" class="tab-content active">
                <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:#6d6a7a;">
                    Recent Orders (Last 7 Days)
                </div>
                <div class="order-list">
                    ${ordersHTML}
                </div>
            </div>
            
            <div id="tab-delivery" class="tab-content">
                <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:#6d6a7a;">
                    Delivery Girl Performance
                </div>
                <div class="delivery-stats">
                    ${girlStatsHTML}
                </div>
            </div>
        `;
        
        const refreshBtn = document.createElement('button');
        refreshBtn.className = 'action-btn';
        refreshBtn.style.marginTop = '12px';
        refreshBtn.style.background = '#cc0000';
        refreshBtn.innerHTML = '<i class="fas fa-sync"></i> Refresh Dashboard';
        refreshBtn.onclick = loadDashboard;
        adminPanel.appendChild(refreshBtn);
    }

    window.switchTab = function(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        if (tab === 'orders') {
            document.querySelector('.tab-btn:first-child').classList.add('active');
            document.getElementById('tab-orders').classList.add('active');
        } else {
            document.querySelector('.tab-btn:last-child').classList.add('active');
            document.getElementById('tab-delivery').classList.add('active');
        }
    };

    // ============================================
    // LOAD SUPABASE AND RUN APP
    // ============================================
    async function loadSupabaseAndRun() {
        try {
            updateStatus('📦 Loading Supabase library...');
            
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });

            updateStatus('✅ Supabase loaded!');
            
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            updateStatus('🔗 Connected to Supabase');

            const { data: testData, error: testError } = await supabaseClient
                .from('menu')
                .select('count')
                .limit(1);

            if (testError) {
                throw new Error(`Connection failed: ${testError.message}`);
            }
            updateStatus('✅ Connection successful!');

            const { data: menuData, error: menuError } = await supabaseClient
                .from('menu')
                .select('*')
                .order('id');

            if (menuError) throw menuError;
            updateStatus(`✅ Menu loaded: ${menuData?.length || 0} items`);

            const { data: girlsData, error: girlsError } = await supabaseClient
                .from('delivery_girls')
                .select('name')
                .order('name');

            if (girlsError) throw girlsError;
            updateStatus(`✅ Girls loaded: ${girlsData?.length || 0}`);

            checkAdminSession();

            renderApp(menuData || [], girlsData?.map(g => g.name) || [], supabaseClient);
            updateStatus('✅ App ready! Serving Kasama District');
            
            if (isAdmin) {
                await loadDashboard();
            }

        } catch (error) {
            console.error('❌ Error:', error);
            updateStatus(`❌ ERROR: ${error.message}`);
            loadingDiv.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <p><strong>Error:</strong></p>
                    <p style="margin-top:8px;">${error.message}</p>
                    <button class="action-btn" onclick="location.reload()" style="margin-top:15px;">
                        <i class="fas fa-sync"></i> Retry
                    </button>
                </div>
                <div class="status-box" style="margin-top:10px;">${statusBox.textContent}</div>
            `;
        }
    }

    function renderApp(menu, deliveryGirls, supabase) {
        let cart = [];
        let orderPlaced = false;
        let customerLocation = 'Kasama, Northern Province, Zambia';
        let orderStatus = '';

        function render() {
            const totalPrice = cart.reduce((acc, i) => acc + i.price * i.qty, 0);
            const cartCount = cart.reduce((acc, i) => acc + i.qty, 0);

            let cartHTML = cart.length === 0 ? 
                '<div style="color:#7a6e86;padding:10px 0;"><i class="fas fa-shopping-cart"></i> Cart is empty</div>' :
                cart.map(item => `
                    <div class="order-row">
                        <span>${item.emoji} ${item.name} × ${item.qty}</span>
                        <span>
                            ZMW ${(item.price * item.qty).toFixed(2)}
                            <button onclick="removeFromCart(${item.id})" style="background:none;border:none;color:#cc0000;margin-left:8px;cursor:pointer;font-size:14px;">
                                <i class="fas fa-minus-circle"></i>
                            </button>
                        </span>
                    </div>
                `).join('');

            let menuHTML = menu.map(item => `
                <div class="menu-item">
                    <div class="info">
                        <span class="name">${item.emoji} ${item.name}</span>
                        <span class="price">ZMW ${item.price.toFixed(2)}</span>
                    </div>
                    <button class="add-btn" onclick="addToCart(${item.id})">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
            `).join('');

            let girlsHTML = deliveryGirls.length === 0 ?
                '<div style="color:#7a6e86;padding:8px 0;">No delivery girls added yet</div>' :
                deliveryGirls.map(g => `
                    <span class="delivery-girl-tag">
                        <i class="fas fa-female"></i> ${g}
                        <span class="remove" onclick="removeGirl('${g}')">
                            <i class="fas fa-times"></i>
                        </span>
                    </span>
                `).join('');

            container.innerHTML = `
                <!-- Kasama Location Banner -->
                <div style="background:linear-gradient(135deg,#cc0000,#990000);color:white;padding:10px 16px;border-radius:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;">
                    <div>
                        <i class="fas fa-map-marker-alt"></i> 
                        <strong>Kasama District</strong>
                        <span style="font-size:11px;opacity:0.8;display:block;">Northern Province, Zambia</span>
                    </div>
                    <div class="real-time-indicator" style="color:white;">
                        <span class="dot"></span> Live
                    </div>
                </div>

                <!-- Menu Section -->
                <div class="card">
                    <div class="section-title">
                        <i class="fas fa-list-ul"></i> Today's Menu
                        <span class="kasama-badge" style="margin-left:auto;">Local</span>
                    </div>
                    ${menuHTML}
                </div>

                <!-- Order Summary -->
                <div class="order-summary">
                    <div class="section-title">
                        <i class="fas fa-shopping-bag"></i> Your Order
                        ${cartCount > 0 ? `<span class="cart-count">${cartCount}</span>` : ''}
                    </div>
                    ${cartHTML}
                    <div class="order-row order-total">
                        <span>Total</span>
                        <span>ZMW ${totalPrice.toFixed(2)}</span>
                    </div>
                    <button class="action-btn" onclick="placeOrder()" ${cart.length === 0 ? 'disabled' : ''}>
                        <i class="fas fa-motorcycle"></i> Place Order · Cash
                    </button>
                    ${orderPlaced ? '<div class="order-placed-banner"><i class="fas fa-check-circle"></i> ✅ Order placed! A delivery girl from Kasama is on the way.</div>' : ''}
                    ${orderStatus ? `<div class="order-status"><i class="fas fa-info-circle"></i> ${orderStatus}</div>` : ''}
                </div>

                <!-- Real-time Map Section -->
                <div class="card">
                    <div class="section-title">
                        <i class="fas fa-map-marked-alt"></i> Real-time Location
                        <span style="font-size:10px;color:#cc0000;margin-left:auto;">
                            <i class="fas fa-globe-africa"></i> OpenStreetMap
                        </span>
                    </div>
                    <div class="map-container">
                        <div class="map-loading" id="mapLoading">
                            <i class="fas fa-spinner fa-spin"></i><br>
                            Loading Kasama map...
                        </div>
                        <div id="map"></div>
                    </div>
                    <div style="font-size:13px;margin-top:6px;display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <i class="fas fa-location-dot" style="color:#cc0000;"></i> 
                            <strong>Customer:</strong> ${customerLocation}
                        </div>
                        <div class="real-time-indicator">
                            <span class="dot"></span> Real-time
                        </div>
                    </div>
                    <input class="location-input" id="locationInput" value="${customerLocation}" 
                           placeholder="Enter delivery address in Kasama" onchange="updateLocation(this.value)" />
                    <div style="font-size:12px;color:#5f556b;margin-top:4px;">
                        <i class="fas fa-user-check"></i> Delivery girls in Kasama see this location
                    </div>
                    <button class="whatsapp-btn" onclick="shareLocation()">
                        <i class="fab fa-whatsapp"></i> Share Location via WhatsApp
                    </button>
                </div>

                <!-- Admin Panel -->
                <div class="admin-panel ${isAdmin ? 'show' : ''}" id="adminPanel">
                    ${isAdmin ? '<div style="text-align:center;padding:20px;color:#cc0000;"><i class="fas fa-spinner fa-spin"></i> Loading dashboard...</div>' : ''}
                </div>
            `;

            // Initialize map after DOM update
            setTimeout(() => {
                if (document.getElementById('map')) {
                    initMap(customerLocation);
                }
            }, 500);

            const panel = document.getElementById('adminPanel');
            if (panel) {
                if (isAdmin) {
                    panel.classList.add('show');
                    if (!dashboardData) {
                        loadDashboard();
                    }
                } else {
                    panel.classList.remove('show');
                }
            }
        }

        // ============================================
        // GLOBAL FUNCTIONS
        // ============================================
        window.addToCart = function(id) {
            const item = menu.find(i => i.id === id);
            if (!item) return;
            const existing = cart.find(i => i.id === id);
            if (existing) {
                cart = cart.map(i => i.id === id ? { ...i, qty: i.qty + 1 } : i);
            } else {
                cart.push({ ...item, qty: 1 });
            }
            render();
        };

        window.removeFromCart = function(id) {
            const existing = cart.find(i => i.id === id);
            if (existing && existing.qty > 1) {
                cart = cart.map(i => i.id === id ? { ...i, qty: i.qty - 1 } : i);
            } else {
                cart = cart.filter(i => i.id !== id);
            }
            render();
        };

        window.updateLocation = function(value) {
            customerLocation = value || 'Kasama, Northern Province, Zambia';
            render();
            updateMapLocation(customerLocation);
        };

        window.shareLocation = function() {
            const message = `📍 I'm ordering from Laura Girls Food Delivery in Kasama!\n📍 Location: ${customerLocation}\n🍽️ Order ready for delivery!`;
            const url = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        };

        window.placeOrder = async function() {
            if (cart.length === 0) {
                alert('Please add items to your order');
                return;
            }

            try {
                const totalPrice = cart.reduce((acc, i) => acc + i.price * i.qty, 0);
                const { data, error } = await supabase
                    .from('orders')
                    .insert({
                        items: cart,
                        total: totalPrice,
                        customer_location: customerLocation,
                        status: 'pending',
                        district: 'Kasama',
                        province: 'Northern Province'
                    })
                    .select();

                if (error) throw error;

                orderPlaced = true;
                orderStatus = '🛵 Order confirmed! A delivery girl from Kasama will arrive in 20-30 minutes.';
                cart = [];
                render();
                
                setTimeout(() => {
                    orderPlaced = false;
                    orderStatus = '';
                    render();
                }, 10000);
                
                alert('✅ Order placed successfully! A delivery girl from Kasama will arrive soon.');
            } catch (error) {
                alert('Failed to place order: ' + error.message);
            }
        };

        window.addDeliveryGirl = async function() {
            if (!isAdmin) {
                alert('⚠️ Admin access required. Please login first.');
                return;
            }

            const input = document.getElementById('newGirlInput');
            const name = input.value.trim();
            if (!name) {
                alert('Please enter a delivery girl name');
                return;
            }

            try {
                const { data: existing } = await supabase
                    .from('delivery_girls')
                    .select('name')
                    .eq('name', name)
                    .single();

                if (existing) {
                    alert('Delivery girl already exists');
                    return;
                }

                const { error } = await supabase
                    .from('delivery_girls')
                    .insert({ name: name });

                if (error) throw error;

                const { data: girlsData } = await supabase
                    .from('delivery_girls')
                    .select('name')
                    .order('name');

                deliveryGirls = girlsData.map(g => g.name);
                input.value = '';
                render();
                alert(`✅ ${name} added as a delivery girl in Kasama!`);
            } catch (error) {
                alert('Failed to add delivery girl: ' + error.message);
            }
        };

        window.removeGirl = async function(name) {
            if (!isAdmin) {
                alert('⚠️ Admin access required. Please login first.');
                return;
            }

            if (!confirm(`Remove ${name} from delivery girls in Kasama?`)) return;

            try {
                const { error } = await supabase
                    .from('delivery_girls')
                    .delete()
                    .eq('name', name);

                if (error) throw error;

                const { data: girlsData } = await supabase
                    .from('delivery_girls')
                    .select('name')
                    .order('name');

                deliveryGirls = girlsData.map(g => g.name);
                render();
                alert('✅ Delivery girl removed successfully!');
            } catch (error) {
                alert('Failed to remove delivery girl: ' + error.message);
            }
        };

        render();
    }

    // Start the app
    loadSupabaseAndRun();
</script>
</body>
</html>
