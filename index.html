<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Laura Girls · Kasama Food Delivery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        #root {
            width: 100%;
            max-width: 430px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            min-height: 780px;
            display: flex;
            flex-direction: column;
        }
        .app-header {
            background: linear-gradient(135deg, #cc0000, #990000);
            padding: 14px 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-header .brand img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffcc00;
        }
        .app-header .brand i {
            font-size: 22px;
            color: #ffcc00;
        }
        .app-header .brand h1 {
            font-size: 16px;
            font-weight: 700;
        }
        .app-header .brand .subtitle {
            font-size: 7px;
            opacity: 0.8;
            display: block;
        }
        .header-btn {
            background: rgba(255,255,255,0.12);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .app-body {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            background: #fafafc;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #f0eff2;
        }
        .section-title {
            font-weight: 600;
            font-size: 13px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .section-title i {
            color: #cc0000;
            margin-right: 5px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .menu-item-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #f0eff2;
            overflow: hidden;
        }
        .menu-item-card .image-container {
            width: 100%;
            height: 100px;
            background: #f5f0f5;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .menu-item-card .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-item-card .image-container .emoji-placeholder {
            font-size: 40px;
        }
        .menu-item-card .item-info {
            padding: 6px 8px;
        }
        .menu-item-card .item-name {
            font-weight: 600;
            font-size: 12px;
        }
        .menu-item-card .item-price {
            color: #cc0000;
            font-weight: 700;
            font-size: 13px;
        }
        .menu-item-card .add-btn-grid {
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 3px 12px;
            font-weight: 600;
            font-size: 10px;
            cursor: pointer;
            margin-top: 4px;
        }
        .order-summary {
            background: white;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #e9e6ed;
            margin-bottom: 10px;
        }
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 12px;
            border-bottom: 1px dashed #e3dfe9;
        }
        .order-total {
            font-weight: 700;
            font-size: 14px;
            padding-top: 4px;
            border-top: 2px solid #cc0000;
            margin-top: 3px;
        }
        .order-total span {
            color: #cc0000;
        }
        .action-btn {
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px;
            font-weight: 700;
            font-size: 13px;
            width: 100%;
            margin-top: 8px;
            cursor: pointer;
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .map-container {
            height: 150px;
            background: #e8e0e0;
            border-radius: 12px;
            overflow: hidden;
            margin: 4px 0;
            position: relative;
        }
        .map-container #map {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .footnote {
            font-size: 9px;
            color: #6d6a7a;
            text-align: center;
            padding: 8px;
            border-top: 1px solid #ece9f0;
            background: #fff5f5;
        }
        .cart-count {
            background: #cc0000;
            color: white;
            border-radius: 50%;
            padding: 0 6px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 5px;
        }
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #cc0000;
        }
        .loading i {
            font-size: 30px;
            margin-bottom: 10px;
        }
        .error-message {
            background: #ffe6e6;
            color: #cc0000;
            padding: 12px;
            border-radius: 12px;
            margin: 6px 0;
            text-align: center;
            font-size: 13px;
        }
        .status-box {
            background: #fff5f5;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            margin: 8px 0;
            color: #333;
            font-family: monospace;
            border: 1px solid #ffe0e0;
        }
        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 4px 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 11px;
            margin-top: 4px;
        }
        .customer-details {
            background: #fff8f8;
            border-radius: 12px;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #ffe0e0;
        }
        .customer-details .form-group {
            margin-bottom: 6px;
        }
        .customer-details label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #6d6a7a;
            margin-bottom: 2px;
        }
        .customer-details input {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid #ffcccc;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
        }
        .customer-details .required {
            color: #cc0000;
        }
        .kasama-badge {
            background: #ffcc00;
            color: #990000;
            padding: 1px 6px;
            border-radius: 12px;
            font-size: 7px;
            font-weight: 700;
        }
        .real-time-indicator .dot {
            width: 5px;
            height: 5px;
            background: #00cc44;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .real-time-indicator {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            color: #cc0000;
        }
        .order-placed-banner {
            background: #cc0000;
            color: white;
            padding: 6px;
            border-radius: 12px;
            text-align: center;
            margin-top: 6px;
            font-size: 12px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .admin-panel {
            background: #fff5f5;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #ffe0e0;
            display: none;
        }
        .admin-panel.show {
            display: block;
        }
        .delivery-girl-tag {
            background: white;
            border-radius: 40px;
            padding: 2px 10px;
            display: inline-block;
            border: 1px solid #ffcccc;
            font-size: 11px;
            margin: 2px;
        }
        .qty-control {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .qty-control button {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }
        .qty-btn-minus {
            background: #f0f0f0;
            color: #333;
        }
        .qty-btn-plus {
            background: #cc0000;
            color: white;
        }
        .qty-number {
            font-weight: 700;
            font-size: 13px;
            min-width: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

<script>
// ============================================

const MENU = [

    },

    },
    { 
        id: 4,

        imgTag: '<img src="https://raw.githubusercontent.com/1chaiwa/Lg.com/main/images/burger.jpg" alt="Burger">',
        description: 'Classic beef burger with chips'
    },
    {

    },
    {

        name: 'Chicken & Chips', 
        price: 38.00, 
        emoji: '🍗',
        imgTag: '<img src="https://raw.githubusercontent.com/1chaiwa/Lg.com/main/images/CHI.jpg" alt="Chicken & Chips">',
        description: 'Fried chicken with crispy chips'
    },
    {

    },
    {

        imgTag: '<img src="https://raw.githubusercontent.com/1chaiwa/Lg.com/main/images/FANTA.jpg" alt="Fanta Orange">',
        description: 'Fanta Orange 1.5L'
    },
    { 
        id: 9, 
        name: 'Kapenta', 
        price: 25.00, 
        emoji: '🐟',
        imgTag: '<img src="https://raw.githubusercontent.com/1chaiwa/Lg.com/main/images/kap.jpg" alt="Kapenta">',
        description: 'Dried Kapenta fish with relish'
    },
    { 
        id: 10, 
        name: 'Okra', 
        price: 20.00, 
        emoji: '🥬',
        imgTag: '<img src="https://raw.githubusercontent.com/1chaiwa/Lg.com/main/images/OKRA.jpg" alt="Okra">',
        description: 'Fresh okra vegetable stew'
    },
    { 
        id: 11, 
        name: 'Pizza', 
        price: 55.00, 
        emoji: '🍕',
        imgTag: '<img src="https://raw.githubusercontent.com/1chaiwa/Lg.com/main/images/pizza.jpg" alt="Pizza">',
        description: 'Large margherita pizza'
    }
];

const DELIVERY_GIRLS = ['Alice Johnson', 'Brenda Smith', 'Cathy Williams'];

let cart = [];
let isAdmin = false;
let customerName = '';
let customerPhone = '';
let customerLocation = 'Kasama, Northern Province, Zambia';

// ============================================
// RENDER APP
// ============================================
function renderApp() {
    const container = document.getElementById('app-container');
    
    const totalPrice = cart.reduce((acc, i) => acc + i.price * i.qty, 0);
    const cartCount = cart.reduce((acc, i) => acc + i.qty, 0);
    
    // Cart HTML
    let cartHTML = cart.length === 0 ? 
        '<div style="color:#7a6e86;padding:4px 0;font-size:12px;"><i class="fas fa-shopping-cart"></i> Cart is empty</div>' :
        cart.map(item => `
            <div class="order-row">
                <span>${item.emoji} ${item.name} × ${item.qty}</span>
                <span>
                    ZMW ${(item.price * item.qty).toFixed(2)}
                    <button onclick="removeFromCart(${item.id})" style="background:none;border:none;color:#cc0000;margin-left:4px;cursor:pointer;font-size:11px;">
                        <i class="fas fa-minus-circle"></i>
                    </button>
                </span>
            </div>
        `).join('');
    
    // Menu Grid HTML - Using the imgTag format
    let menuHTML = MENU.map(item => {
        const qty = cart.find(i => i.id === item.id)?.qty || 0;
        
        return `
            <div class="menu-item-card">
                <div class="image-container">
                    ${item.imgTag}
                </div>
                <div class="item-info">
                    <div class="item-name">${item.emoji} ${item.name}</div>
                    <div style="font-size:9px;color:#888;">${item.description || ''}</div>
                    <div class="item-price">ZMW ${item.price.toFixed(2)}</div>
                    <div style="margin-top:4px;">
                        ${qty === 0 ? `
                            <button class="add-btn-grid" onclick="addToCart(${item.id})">
                                <i class="fas fa-plus"></i> Add
                            </button>
                        ` : `
                            <div class="qty-control">
                                <button class="qty-btn-minus" onclick="removeFromCart(${item.id})">−</button>
                                <span class="qty-number">${qty}</span>
                                <button class="qty-btn-plus" onclick="addToCart(${item.id})">+</button>
                            </div>
                        `}
                    </div>
                </div>
            </div>
        `;
    }).join('');
    
    container.innerHTML = `
        <!-- Banner -->
        <div style="background:linear-gradient(135deg,#cc0000,#990000);color:white;padding:6px 12px;border-radius:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;">
            <div>
                <i class="fas fa-map-marker-alt"></i> 
                <strong>Kasama District</strong>
                <span style="font-size:9px;opacity:0.8;display:block;">Northern Province, Zambia</span>
            </div>
            <div class="real-time-indicator" style="color:white;">
                <span class="dot"></span> Live
            </div>
        </div>
        
        <!-- Menu -->
        <div class="card">
            <div class="section-title">
                <i class="fas fa-th-large"></i> Today's Menu
                <span class="kasama-badge" style="margin-left:auto;">${MENU.length} items</span>
            </div>
            <div class="menu-grid">${menuHTML}</div>
        </div>
        
        <!-- Order Summary -->
        <div class="order-summary">
            <div class="section-title">
                <i class="fas fa-shopping-bag"></i> Your Order
                ${cartCount > 0 ? `<span class="cart-count">${cartCount}</span>` : ''}
            </div>
            ${cartHTML}
            <div class="order-row order-total">
                <span>Total</span>
                <span>ZMW ${totalPrice.toFixed(2)}</span>
            </div>
            
            <!-- Customer Details -->
            <div class="customer-details">
                <div style="font-size:11px;font-weight:600;color:#cc0000;margin-bottom:4px;">
                    <i class="fas fa-user"></i> Delivery Details
                </div>
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="customerNameInput" placeholder="Enter your full name" value="${customerName}" />
                </div>
                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" id="customerPhoneInput" placeholder="Enter phone number (e.g., 0977123456)" value="${customerPhone}" />
                </div>
                <div class="form-group">
                    <label>Delivery Address <span class="required">*</span></label>
                    <input type="text" id="customerAddressInput" placeholder="Enter your delivery address" value="${customerLocation}" />
                </div>
            </div>
            
            <button class="action-btn" onclick="placeOrder()" ${cart.length === 0 ? 'disabled' : ''}>
                <i class="fas fa-motorcycle"></i> Place Order · Cash
            </button>
            <div id="orderStatus"></div>
        </div>
        
        <!-- Map -->
        <div class="card">
            <div class="section-title">
                <i class="fas fa-map-marked-alt"></i> Location
            </div>
            <div class="map-container">
                <div id="map"></div>
            </div>
            <div style="font-size:11px;margin-top:3px;">
                <i class="fas fa-location-dot" style="color:#cc0000;"></i> 
                <strong>Customer:</strong> ${customerLocation}
            </div>
            <button class="whatsapp-btn" onclick="shareLocation()">
                <i class="fab fa-whatsapp"></i> Share Location
            </button>
        </div>
        
        <!-- Admin Panel -->
        <div class="admin-panel ${isAdmin ? 'show' : ''}">
            <div class="section-title">
                <i class="fas fa-user-gear"></i> Admin
            </div>
            <div style="font-size:12px;color:#666;">
                <p><strong>Delivery Girls:</strong></p>
                ${DELIVERY_GIRLS.map(g => `<span class="delivery-girl-tag"><i class="fas fa-female"></i> ${g}</span>`).join('')}
            </div>
            <div style="margin-top:6px;">
                <button class="action-btn" onclick="toggleAdmin()" style="font-size:12px;padding:4px;margin-top:4px;background:#666;">
                    <i class="fas fa-sign-out-alt"></i> Close Admin
                </button>
            </div>
        </div>
    `;
    
    // Update input listeners
    document.getElementById('customerNameInput')?.addEventListener('input', function() {
        customerName = this.value;
    });
    document.getElementById('customerPhoneInput')?.addEventListener('input', function() {
        customerPhone = this.value;
    });
    document.getElementById('customerAddressInput')?.addEventListener('input', function() {
        customerLocation = this.value || 'Kasama, Northern Province, Zambia';
        initMap(customerLocation);
    });
    
    // Initialize map
    setTimeout(() => initMap(customerLocation), 300);
}

// ============================================
// MAP FUNCTIONS
// ============================================
let map = null;
let mapMarker = null;

function initMap(location) {
    try {
        const mapContainer = document.getElementById('map');
        if (!mapContainer) return;
        
        let lat = -10.2129;
        let lng = 31.1809;
        
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}&limit=1`)
            .then(r => r.json())
            .then(data => {
                if (data && data.length > 0) {
                    lat = parseFloat(data[0].lat);
                    lng = parseFloat(data[0].lon);
                }
                createMap(lat, lng, location);
            })
            .catch(() => createMap(lat, lng, location));
    } catch (e) {
        console.error('Map error:', e);
    }
}

function createMap(lat, lng, location) {
    if (map) {
        map.remove();
    }
    
    map = L.map('map').setView([lat, lng], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    
    const markerIcon = L.divIcon({
        html: '<i class="fas fa-map-marker-alt" style="color:#cc0000;font-size:28px;"></i>',
        className: 'custom-marker',
        iconSize: [28, 28],
        iconAnchor: [14, 28]
    });
    
    mapMarker = L.marker([lat, lng], { icon: markerIcon }).addTo(map);
    mapMarker.bindPopup(`<strong>📍 ${location}</strong>`).openPopup();
}

// ============================================
// APP FUNCTIONS
// ============================================
function addToCart(id) {
    const item = MENU.find(i => i.id === id);
    if (!item) return;
    const existing = cart.find(i => i.id === id);
    if (existing) {
        cart = cart.map(i => i.id === id ? { ...i, qty: i.qty + 1 } : i);
    } else {
        cart.push({ ...item, qty: 1 });
    }
    renderApp();
}

function removeFromCart(id) {
    const existing = cart.find(i => i.id === id);
    if (existing && existing.qty > 1) {
        cart = cart.map(i => i.id === id ? { ...i, qty: i.qty - 1 } : i);
    } else {
        cart = cart.filter(i => i.id !== id);
    }
    renderApp();
}

function placeOrder() {
    if (cart.length === 0) {
        alert('Please add items to your order');
        return;
    }
    
    const nameInput = document.getElementById('customerNameInput');
    const phoneInput = document.getElementById('customerPhoneInput');
    const addressInput = document.getElementById('customerAddressInput');
    
    const name = nameInput ? nameInput.value.trim() : '';
    const phone = phoneInput ? phoneInput.value.trim() : '';
    const address = addressInput ? addressInput.value.trim() : 'Kasama, Northern Province, Zambia';
    
    if (!name) {
        alert('⚠️ Please enter your full name');
        nameInput?.focus();
        return;
    }
    if (!phone) {
        alert('⚠️ Please enter your phone number');
        phoneInput?.focus();
        return;
    }
    if (!address) {
        alert('⚠️ Please enter your delivery address');
        addressInput?.focus();
        return;
    }
    
    const totalPrice = cart.reduce((acc, i) => acc + i.price * i.qty, 0);
    
    document.getElementById('orderStatus').innerHTML = `
        <div class="order-placed-banner">
            <i class="fas fa-check-circle"></i> ✅ Order confirmed, ${name}! 
            <br>🛵 A delivery girl will arrive in 20-30 minutes.
            <br>📱 We'll call you at ${phone}
            <br>📍 Delivering to: ${address}
        </div>
    `;
    
    console.log('📝 ORDER PLACED:', { 
        customer: name, 
        phone: phone, 
        address: address, 
        items: cart, 
        total: totalPrice 
    });
    
    cart = [];
    customerName = name;
    customerPhone = phone;
    customerLocation = address;
    
    setTimeout(() => {
        document.getElementById('orderStatus').innerHTML = '';
        renderApp();
    }, 8000);
    
    alert(`✅ Order placed successfully, ${name}!\n\n📱 We'll call you at ${phone}\n📍 Delivering to: ${address}\n🛵 A delivery girl from Kasama will arrive soon.`);
}

function shareLocation() {
    const message = `📍 I'm ordering from Laura Girls Food Delivery in Kasama!\n📍 Location: ${customerLocation}\n👤 Name: ${customerName}\n📱 Phone: ${customerPhone}`;
    const url = `https://wa.me/?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
}

function toggleAdmin() {
    isAdmin = !isAdmin;
    renderApp();
}
