<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Chikorlando Restaurant & Food Delivery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        #root {
            width: 100%;
            max-width: 430px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            min-height: 780px;
            display: flex;
            flex-direction: column;
        }
        .app-header {
            background: linear-gradient(135deg, #cc0000, #990000);
            padding: 14px 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-header .brand i {
            font-size: 22px;
            color: #ffcc00;
        }
        .app-header .brand h1 {
            font-size: 16px;
            font-weight: 700;
        }
        .app-header .brand .subtitle {
            font-size: 7px;
            opacity: 0.8;
            display: block;
        }
        .app-header .header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.15s;
        }
        .header-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .header-btn.active {
            background: #ffcc00;
            color: #990000;
        }
        .delivery-name {
            font-size: 9px;
            background: rgba(255,255,255,0.15);
            padding: 2px 8px;
            border-radius: 12px;
            display: none;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .delivery-name.show {
            display: inline-block;
        }
        .app-body {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            background: #fafafc;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #f0eff2;
        }
        .section-title {
            font-weight: 600;
            font-size: 13px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .section-title i {
            color: #cc0000;
            margin-right: 5px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .menu-item-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #f0eff2;
            overflow: hidden;
        }
        .menu-item-card .image-container {
            width: 100%;
            height: 100px;
            background: #f5f0f5;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-item-card .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-item-card .image-container .emoji-placeholder {
            font-size: 40px;
        }
        .menu-item-card .item-info {
            padding: 6px 8px;
        }
        .menu-item-card .item-name {
            font-weight: 600;
            font-size: 12px;
        }
        .menu-item-card .item-price {
            color: #cc0000;
            font-weight: 700;
            font-size: 13px;
        }
        .menu-item-card .add-btn-grid {
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 3px 12px;
            font-weight: 600;
            font-size: 10px;
            cursor: pointer;
            margin-top: 4px;
        }
        .order-summary {
            background: white;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #e9e6ed;
            margin-bottom: 10px;
        }
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 12px;
            border-bottom: 1px dashed #e3dfe9;
        }
        .order-total {
            font-weight: 700;
            font-size: 14px;
            padding-top: 4px;
            border-top: 2px solid #cc0000;
            margin-top: 3px;
        }
        .order-total span {
            color: #cc0000;
        }
        .action-btn {
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px;
            font-weight: 700;
            font-size: 13px;
            width: 100%;
            margin-top: 8px;
            cursor: pointer;
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .footnote {
            font-size: 9px;
            color: #6d6a7a;
            text-align: center;
            padding: 8px;
            border-top: 1px solid #ece9f0;
            background: #fff5f5;
        }
        .cart-count {
            background: #cc0000;
            color: white;
            border-radius: 50%;
            padding: 0 6px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 5px;
        }
        .customer-details {
            background: #fff8f8;
            border-radius: 12px;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #ffe0e0;
        }
        .customer-details .form-group {
            margin-bottom: 6px;
        }
        .customer-details label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #6d6a7a;
            margin-bottom: 2px;
        }
        .customer-details input {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid #ffcccc;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
        }
        .customer-details .required {
            color: #cc0000;
        }
        .kasama-badge {
            background: #ffcc00;
            color: #990000;
            padding: 1px 6px;
            border-radius: 12px;
            font-size: 7px;
            font-weight: 700;
        }
        .real-time-indicator .dot {
            width: 5px;
            height: 5px;
            background: #00cc44;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .real-time-indicator {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            color: #cc0000;
        }
        .order-placed-banner {
            background: #cc0000;
            color: white;
            padding: 6px;
            border-radius: 12px;
            text-align: center;
            margin-top: 6px;
            font-size: 12px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .admin-panel {
            background: #fff5f5;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #ffe0e0;
            display: none;
        }
        .admin-panel.show {
            display: block;
        }
        .delivery-girl-tag {
            background: white;
            border-radius: 40px;
            padding: 2px 10px;
            display: inline-block;
            border: 1px solid #ffcccc;
            font-size: 11px;
            margin: 2px;
        }
        .qty-control {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .qty-control button {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }
        .qty-btn-minus {
            background: #f0f0f0;
            color: #333;
        }
        .qty-btn-plus {
            background: #cc0000;
            color: white;
        }
        .qty-number {
            font-weight: 700;
            font-size: 13px;
            min-width: 16px;
            text-align: center;
        }
        .empty-slot {
            background: #f9f9f9;
            border: 2px dashed #ddd;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
            color: #999;
            font-size: 11px;
            padding: 10px;
            text-align: center;
        }
        .empty-slot i {
            font-size: 30px;
            color: #ccc;
            margin-bottom: 5px;
        }
        .delivery-login-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .delivery-login-modal.show {
            display: flex;
        }
        .delivery-login-box {
            background: white;
            padding: 20px;
            border-radius: 24px;
            max-width: 300px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .delivery-login-box h2 {
            color: #cc0000;
            margin-bottom: 14px;
            text-align: center;
            font-size: 16px;
        }
        .delivery-login-box input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ffcccc;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 13px;
            outline: none;
        }
        .delivery-login-box input:focus {
            border-color: #cc0000;
        }
        .delivery-login-box button {
            width: 100%;
            padding: 8px;
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }
        .delivery-login-box .error {
            color: #cc0000;
            font-size: 11px;
            text-align: center;
            margin-top: 6px;
            display: none;
        }
        .delivery-login-box .error.show {
            display: block;
        }
        .delivery-login-box .close-btn {
            margin-top: 6px;
            background: #999;
            width: 100%;
            padding: 6px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div id="root">
    <div class="app-header">
        <div class="brand">
            <i class="fas fa-utensils"></i>
            <div>
                <h1>Chikorlando</h1>
                <span class="subtitle">Restaurant & Food Delivery</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" id="deliveryLoginBtn" onclick="openDeliveryLogin()">
                <i class="fas fa-motorcycle"></i> 
                <span id="deliveryBtnText">Delivery</span>
            </button>
            <button class="header-btn" onclick="toggleAdmin()">
                <i class="fas fa-user-shield"></i>
            </button>
            <span class="delivery-name" id="deliveryNameDisplay"></span>
        </div>
    </div>
    <div id="app-container" class="app-body">
        <!-- Content will be rendered here -->
    </div>
    <div class="footnote">
        <i class="fas fa-shield-alt"></i> Cash on delivery · Serving Kasama District, Northern Province, Zambia
    </div>
</div>

<!-- Delivery Girl Login Modal -->
<div class="delivery-login-modal" id="deliveryLoginModal">
    <div class="delivery-login-box">
        <h2><i class="fas fa-motorcycle"></i> Delivery Login</h2>
        <p style="font-size:11px;color:#666;text-align:center;margin-bottom:10px;">Enter your name to start delivering</p>
        <input type="text" id="deliveryLoginName" placeholder="Enter your name" onkeypress="if(event.key==='Enter') deliveryLogin()" />
        <button onclick="deliveryLogin()">Login</button>
        <div class="error" id="deliveryLoginError">❌ Please enter your name</div>
        <button class="close-btn" onclick="closeDeliveryLogin()">Cancel</button>
    </div>
</div>

<script>
// ============================================
// SIMPLE WORKING VERSION - NO EXTERNAL DEPENDENCIES
// ============================================

// MENU DATA
const MENU = [
    { id: 1, name: 'Fried Fish', price: 60.00, emoji: '🐟', description: 'Crispy fried fish with chips' },
    { id: 2, name: 'Beef Burger', price: 35.00, emoji: '🍔', description: 'With lettuce, cheese & fries' },
    { id: 3, name: 'Breakfast Roll', price: 25.00, emoji: '🥐', description: 'Egg, sausage & cheese roll' },
    { id: 4, name: 'Burger', price: 30.00, emoji: '🍔', description: 'Classic beef burger with chips' },
    { id: 5, name: 'ChiWing', price: 40.00, emoji: '🍗', description: 'Spicy chicken wings (6 pieces)' },
    { id: 6, name: 'Chicken & Chips', price: 38.00, emoji: '🍗', description: 'Fried chicken with crispy chips' },
    { id: 7, name: 'Coca-Cola', price: 8.00, emoji: '🥤', description: 'Ice cold Coca-Cola 1.5L' },
    { id: 8, name: 'Fanta Orange', price: 8.00, emoji: '🥤', description: 'Fanta Orange 1.5L' },
    { id: 9, name: 'Kapenta', price: 25.00, emoji: '🐟', description: 'Dried Kapenta fish with relish' },
    { id: 10, name: 'Okra', price: 20.00, emoji: '🥬', description: 'Fresh okra vegetable stew' },
    { id: 11, name: 'Pizza', price: 55.00, emoji: '🍕', description: 'Large margherita pizza' },
    // Empty slots
    { id: 12, name: 'Add Item 1', price: 0, emoji: '➕', description: 'Coming soon' },
    { id: 13, name: 'Add Item 2', price: 0, emoji: '➕', description: 'Coming soon' },
    { id: 14, name: 'Add Item 3', price: 0, emoji: '➕', description: 'Coming soon' },
    { id: 15, name: 'Add Item 4', price: 0, emoji: '➕', description: 'Coming soon' },
    { id: 16, name: 'Add Item 5', price: 0, emoji: '➕', description: 'Coming soon' }
];

const DELIVERY_GIRLS = ['Chaiwa Justine', 'Brenda Mwansa', 'Chola Williams'];

let cart = [];
let isAdmin = false;
let isDeliveryLoggedIn = false;
let deliveryGirlName = '';
let customerName = '';
let customerPhone = '';
let customerLocation = 'Kasama, Northern Province, Zambia';

// ============================================
// DELIVERY LOGIN FUNCTIONS
// ============================================
function openDeliveryLogin() {
    document.getElementById('deliveryLoginModal').classList.add('show');
    document.getElementById('deliveryLoginName').value = '';
    document.getElementById('deliveryLoginError').classList.remove('show');
    document.getElementById('deliveryLoginName').focus();
}

function closeDeliveryLogin() {
    document.getElementById('deliveryLoginModal').classList.remove('show');
}

function deliveryLogin() {
    const name = document.getElementById('deliveryLoginName').value.trim();
    if (!name) {
        document.getElementById('deliveryLoginError').textContent = '❌ Please enter your name';
        document.getElementById('deliveryLoginError').classList.add('show');
        return;
    }
    if (!DELIVERY_GIRLS.includes(name)) {
        document.getElementById('deliveryLoginError').textContent = '❌ Name not found. Contact admin.';
        document.getElementById('deliveryLoginError').classList.add('show');
        return;
    }
    isDeliveryLoggedIn = true;
    deliveryGirlName = name;
    document.getElementById('deliveryLoginModal').classList.remove('show');
    document.getElementById('deliveryNameDisplay').textContent = '👩 ' + name;
    document.getElementById('deliveryNameDisplay').classList.add('show');
    document.getElementById('deliveryBtnText').textContent = 'Logout';
    document.getElementById('deliveryLoginBtn').onclick = deliveryLogout;
    document.getElementById('deliveryLoginBtn').classList.add('active');
    alert('✅ Welcome ' + name + '! You are now logged in.');
    renderApp();
}

function deliveryLogout() {
    isDeliveryLoggedIn = false;
    deliveryGirlName = '';
    document.getElementById('deliveryNameDisplay').classList.remove('show');
    document.getElementById('deliveryBtnText').textContent = 'Delivery';
    document.getElementById('deliveryLoginBtn').onclick = openDeliveryLogin;
    document.getElementById('deliveryLoginBtn').classList.remove('active');
    alert('👋 Logged out from delivery');
    renderApp();
}

// Close modal on outside click
document.getElementById('deliveryLoginModal')?.addEventListener('click', function(e) {
    if (e.target === this) closeDeliveryLogin();
});

// ============================================
// RENDER APP
// ============================================
function renderApp() {
    const container = document.getElementById('app-container');
    
    const totalPrice = cart.reduce((acc, i) => acc + i.price * i.qty, 0);
    const cartCount = cart.reduce((acc, i) => acc + i.qty, 0);
    
    // Cart HTML
    let cartHTML = cart.length === 0 ? 
        '<div style="color:#7a6e86;padding:4px 0;font-size:12px;"><i class="fas fa-shopping-cart"></i> Cart is empty</div>' :
        cart.map(item => `
            <div class="order-row">
                <span>${item.emoji} ${item.name} × ${item.qty}</span>
                <span>ZMW ${(item.price * item.qty).toFixed(2)}
                    <button onclick="removeFromCart(${item.id})" style="background:none;border:none;color:#cc0000;margin-left:4px;cursor:pointer;font-size:11px;">
                        <i class="fas fa-minus-circle"></i>
                    </button>
                </span>
            </div>
        `).join('');
    
    // Menu Grid HTML
    let menuHTML = MENU.map(item => {
        const qty = cart.find(i => i.id === item.id)?.qty || 0;
        const isSlot = item.id >= 12;
        const isAvailable = item.price > 0;
        
        return `
            <div class="menu-item-card" style="${isSlot ? 'opacity:0.6;' : ''}">
                <div class="image-container">
                    <span class="emoji-placeholder">${item.emoji}</span>
                </div>
                <div class="item-info">
                    <div class="item-name">${item.emoji} ${item.name}</div>
                    <div style="font-size:9px;color:#888;">${item.description || ''}</div>
                    <div class="item-price">${isAvailable ? 'ZMW ' + item.price.toFixed(2) : 'Coming Soon'}</div>
                    <div style="margin-top:4px;">
                        ${qty > 0 ? `
                            <div class="qty-control">
                                <button class="qty-btn-minus" onclick="removeFromCart(${item.id})">−</button>
                                <span class="qty-number">${qty}</span>
                                <button class="qty-btn-plus" onclick="addToCart(${item.id})">+</button>
                            </div>
                        ` : isAvailable ? `
                            <button class="add-btn-grid" onclick="addToCart(${item.id})">
                                <i class="fas fa-plus"></i> Add
                            </button>
                        ` : `
                            <div style="font-size:9px;color:#999;">Coming Soon</div>
                        `}
                    </div>
                </div>
            </div>
        `;
    }).join('');
    
    container.innerHTML = `
        <!-- Banner -->
        <div style="background:linear-gradient(135deg,#cc0000,#990000);color:white;padding:6px 12px;border-radius:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;">
            <div>
                <i class="fas fa-map-marker-alt"></i> 
                <strong>Kasama District</strong>
                <span style="font-size:9px;opacity:0.8;display:block;">Northern Province, Zambia</span>
            </div>
            <div class="real-time-indicator" style="color:white;">
                <span class="dot"></span> Live
            </div>
        </div>
        
        ${isDeliveryLoggedIn ? `
            <div style="background:#e8f5e9;padding:4px 10px;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;font-size:11px;border:1px solid #a5d6a7;">
                <span><i class="fas fa-motorcycle" style="color:#cc0000;"></i> <strong>${deliveryGirlName}</strong> is online</span>
                <span style="color:#2e7d32;font-size:9px;"><i class="fas fa-circle" style="color:#4caf50;"></i> Available</span>
            </div>
        ` : ''}
        
        <!-- Menu -->
        <div class="card">
            <div class="section-title">
                <i class="fas fa-th-large"></i> Today's Menu
                <span class="kasama-badge" style="margin-left:auto;">${MENU.filter(m => m.price > 0).length} items</span>
            </div>
            <div class="menu-grid">${menuHTML}</div>
            <div style="font-size:9px;color:#999;margin-top:8px;text-align:center;border-top:1px solid #f0f0f0;padding-top:6px;">
                <i class="fas fa-info-circle"></i> ${MENU.filter(m => m.price === 0).length} empty slots - Add your own items!
            </div>
        </div>
        
        <!-- Order Summary -->
        <div class="order-summary">
            <div class="section-title">
                <i class="fas fa-shopping-bag"></i> Your Order
                ${cartCount > 0 ? `<span class="cart-count">${cartCount}</span>` : ''}
            </div>
            ${cartHTML}
            <div class="order-row order-total">
                <span>Total</span>
                <span>ZMW ${totalPrice.toFixed(2)}</span>
            </div>
            
            <div class="customer-details">
                <div style="font-size:11px;font-weight:600;color:#cc0000;margin-bottom:4px;">
                    <i class="fas fa-user"></i> Delivery Details
                </div>
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="customerNameInput" placeholder="Enter your full name" value="${customerName}" />
                </div>
                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" id="customerPhoneInput" placeholder="Enter phone number (e.g., 0977123456)" value="${customerPhone}" />
                </div>
                <div class="form-group">
                    <label>Delivery Address <span class="required">*</span></label>
                    <input type="text" id="customerAddressInput" placeholder="Enter your delivery address" value="${customerLocation}" />
                </div>
            </div>
            
            <button class="action-btn" onclick="placeOrder()" ${cart.length === 0 ? 'disabled' : ''}>
                <i class="fas fa-motorcycle"></i> Place Order · Cash
            </button>
            <div id="orderStatus"></div>
        </div>
        
        <!-- Admin Panel -->
        <div class="admin-panel ${isAdmin ? 'show' : ''}">
            <div class="section-title">
                <i class="fas fa-user-gear"></i> Admin
            </div>
            <div style="font-size:12px;color:#666;">
                <p><strong>Delivery Girls:</strong></p>
                ${DELIVERY_GIRLS.map(g => `<span class="delivery-girl-tag"><i class="fas fa-female"></i> ${g}</span>`).join('')}
            </div>
            <div style="margin-top:6px;">
                <button class="action-btn" onclick="toggleAdmin()" style="font-size:12px;padding:4px;margin-top:4px;background:#666;">
                    <i class="fas fa-sign-out-alt"></i> Close Admin
                </button>
            </div>
        </div>
    `;
    
    // Update input listeners
    document.getElementById('customerNameInput')?.addEventListener('input', function() {
        customerName = this.value;
    });
    document.getElementById('customerPhoneInput')?.addEventListener('input', function() {
        customerPhone = this.value;
    });
    document.getElementById('customerAddressInput')?.addEventListener('input', function() {
        customerLocation = this.value || 'Kasama, Northern Province, Zambia';
    });
}

// ============================================
// APP FUNCTIONS
// ============================================
function addToCart(id) {
    const item = MENU.find(i => i.id === id);
    if (!item || item.price === 0) {
        alert('This item is not available yet. Check back soon!');
        return;
    }
    const existing = cart.find(i => i.id === id);
    if (existing) {
        cart = cart.map(i => i.id === id ? { ...i, qty: i.qty + 1 } : i);
    } else {
        cart.push({ ...item, qty: 1 });
    }
    renderApp();
}

function removeFromCart(id) {
    const existing = cart.find(i => i.id === id);
    if (existing && existing.qty > 1) {
        cart = cart.map(i => i.id === id ? { ...i, qty: i.qty - 1 } : i);
    } else {
        cart = cart.filter(i => i.id !== id);
    }
    renderApp();
}

function placeOrder() {
    if (cart.length === 0) {
        alert('Please add items to your order');
        return;
    }
    
    const nameInput = document.getElementById('customerNameInput');
    const phoneInput = document.getElementById('customerPhoneInput');
    const addressInput = document.getElementById('customerAddressInput');
    
    const name = nameInput ? nameInput.value.trim() : '';
    const phone = phoneInput ? phoneInput.value.trim() : '';
    const address = addressInput ? addressInput.value.trim() : 'Kasama, Northern Province, Zambia';
    
    if (!name) { alert('⚠️ Please enter your full name'); nameInput?.focus(); return; }
    if (!phone) { alert('⚠️ Please enter your phone number'); phoneInput?.focus(); return; }
    if (!address) { alert('⚠️ Please enter your delivery address'); addressInput?.focus(); return; }
    
    const totalPrice = cart.reduce((acc, i) => acc + i.price * i.qty, 0);
    
    document.getElementById('orderStatus').innerHTML = `
        <div class="order-placed-banner">
            <i class="fas fa-check-circle"></i> ✅ Order confirmed, ${name}! 
            <br>🛵 ${isDeliveryLoggedIn ? deliveryGirlName : 'A delivery girl'} will arrive in 20-30 minutes.
            <br>📱 We'll call you at ${phone}
        </div>
    `;
    
    console.log('📝 ORDER PLACED:', { customer: name, phone, address, items: cart, total: totalPrice });
    
    cart = [];
    customerName = name;
    customerPhone = phone;
    customerLocation = address;
    
    setTimeout(() => {
        document.getElementById('orderStatus').innerHTML = '';
        renderApp();
    }, 8000);
    
    alert(`✅ Order placed successfully, ${name}!\n\n📱 We'll call you at ${phone}\n📍 Delivering to: ${address}\n🛵 ${isDeliveryLoggedIn ? deliveryGirlName : 'A delivery girl'} will arrive soon.`);
}

function toggleAdmin() {
    isAdmin = !isAdmin;
    renderApp();
}

// ============================================
// START THE APP
// ============================================
renderApp();
console.log('✅ Chikorlando Restaurant App Loaded!');
console.log('📍 Serving Kasama District, Zambia');
</script>
