<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Laura Girls · Food Delivery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        #root {
            width: 100%;
            max-width: 430px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            min-height: 780px;
            display: flex;
            flex-direction: column;
        }
        .app-header {
            background: linear-gradient(135deg, #6c2b8a, #8b3fa8);
            padding: 18px 20px 14px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-header i {
            font-size: 26px;
            color: #ffcc00;
        }
        .app-header h1 {
            font-size: 20px;
            font-weight: 600;
            flex: 1;
        }
        .app-header .badge {
            background: #ffcc00;
            color: #1f1f2e;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .app-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            background: #fafafc;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #f0eff2;
        }
        .section-title {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .section-title i {
            color: #6c2b8a;
            margin-right: 8px;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0edf3;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item .name {
            font-weight: 500;
        }
        .menu-item .price {
            color: #6c2b8a;
            font-weight: 600;
        }
        .menu-item .add-btn {
            background: #6c2b8a;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .order-summary {
            background: white;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #e9e6ed;
            margin-bottom: 16px;
        }
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed #e3dfe9;
        }
        .order-row:last-child {
            border-bottom: none;
        }
        .order-total {
            font-weight: 700;
            font-size: 16px;
            padding-top: 8px;
        }
        .order-total span {
            color: #6c2b8a;
        }
        .action-btn {
            background: #ffcc00;
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }
        .map-container {
            height: 160px;
            background: #d9d2e3;
            border-radius: 20px;
            overflow: hidden;
            margin: 4px 0;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .admin-panel {
            background: #f4f0f9;
            border-radius: 24px;
            padding: 16px;
        }
        .admin-input-group {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
        .admin-input-group input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #d6cee0;
            border-radius: 40px;
            font-size: 14px;
            outline: none;
        }
        .admin-input-group button {
            background: #6c2b8a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .delivery-girl-tag {
            background: white;
            border-radius: 40px;
            padding: 6px 14px;
            display: inline-block;
            margin: 4px;
            border: 1px solid #d4cade;
        }
        .delivery-girl-tag .remove {
            color: #b0003a;
            cursor: pointer;
            margin-left: 8px;
        }
        .footnote {
            font-size: 11px;
            color: #6d6a7a;
            text-align: center;
            padding: 12px;
            border-top: 1px solid #ece9f0;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6c2b8a;
        }
        .loading i {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .error-message {
            background: #ffe6e6;
            color: #b0003a;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            text-align: center;
        }
        .success-message {
            background: #e6ffe6;
            color: #1f8b4c;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
        .status-box {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin: 10px 0;
            color: #333;
        }
    </style>
</head>
<body>
<div id="root">
    <div class="app-header">
        <i class="fas fa-utensils"></i>
        <h1>Laura Girls Food</h1>
        <span class="badge"><i class="fas fa-motorcycle"></i> delivery</span>
    </div>
    <div id="app-container" class="app-body">
        <div class="loading" id="loadingDiv">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading delicious food...</p>
            <div class="status-box" id="statusBox">⏳ Initializing...</div>
        </div>
    </div>
    <div class="footnote">
        <i class="fas fa-shield-alt"></i> Cash on delivery · MTN MoMo style
    </div>
</div>

<script>
    // ============================================
    // SUPABASE CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://ndwoqlxtaczwxsescemu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kd29xbHh0YWN6d3hzZXNjZW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5Mjk2MTQsImV4cCI6MjA5ODUwNTYxNH0.43PgLQSdEESXboLGrdtZCHq-f8TwzItXaGuxmI4NEe8';

    const container = document.getElementById('app-container');
    const loadingDiv = document.getElementById('loadingDiv');
    const statusBox = document.getElementById('statusBox');

    function updateStatus(message) {
        console.log(message);
        if (statusBox) {
            statusBox.textContent = message;
        }
    }

    updateStatus('🚀 App starting...');

    // ============================================
    // SIMPLE DIRECT APPROACH - NO REACT
    // ============================================
    async function loadSupabaseAndRun() {
        try {
            updateStatus('📦 Loading Supabase library...');
            
            // Load Supabase dynamically
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });

            updateStatus('✅ Supabase loaded!');
            
            // Create Supabase client
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            updateStatus('🔗 Connected to Supabase');

            // Test connection
            updateStatus('📡 Testing connection...');
            const { data: testData, error: testError } = await supabase
                .from('menu')
                .select('count')
                .limit(1);

            if (testError) {
                throw new Error(`Connection failed: ${testError.message}`);
            }
            updateStatus('✅ Connection successful!');

            // Fetch menu
            updateStatus('📋 Fetching menu...');
            const { data: menuData, error: menuError } = await supabase
                .from('menu')
                .select('*')
                .order('id');

            if (menuError) throw menuError;
            updateStatus(`✅ Menu loaded: ${menuData?.length || 0} items`);

            // Fetch delivery girls
            updateStatus('👩 Fetching delivery girls...');
            const { data: girlsData, error: girlsError } = await supabase
                .from('delivery_girls')
                .select('name')
                .order('name');

            if (girlsError) throw girlsError;
            updateStatus(`✅ Girls loaded: ${girlsData?.length || 0}`);

            // Now render the app
            updateStatus('🎨 Rendering app...');
            renderApp(menuData || [], girlsData || [], supabase);
            updateStatus('✅ App ready!');

        } catch (error) {
            console.error('❌ Error:', error);
            updateStatus(`❌ ERROR: ${error.message}`);
            loadingDiv.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <p><strong>Error:</strong></p>
                    <p style="margin-top:8px;">${error.message}</p>
                    <button class="action-btn" onclick="location.reload()" style="margin-top:15px;">
                        <i class="fas fa-sync"></i> Retry
                    </button>
                </div>
                <div class="status-box" style="margin-top:10px;">${statusBox.textContent}</div>
            `;
        }
    }

    function renderApp(menu, deliveryGirls, supabase) {
        let cart = [];
        let newGirl = '';
        let orderPlaced = false;
        const customerLocation = 'Accra, Ghana';

        function render() {
            const totalPrice = cart.reduce((acc, i) => acc + i.price * i.qty, 0);

            let cartHTML = cart.length === 0 ? 
                '<div style="color:#7a6e86;padding:10px 0;"><i class="fas fa-shopping-cart"></i> Cart is empty</div>' :
                cart.map(item => `
                    <div class="order-row" key="${item.id}">
                        <span>${item.name} × ${item.qty}</span>
                        <span>
                            $${(item.price * item.qty).toFixed(2)}
                            <button onclick="removeFromCart(${item.id})" style="background:none;border:none;color:#b0003a;margin-left:8px;cursor:pointer;">
                                <i class="fas fa-minus-circle"></i>
                            </button>
                        </span>
                    </div>
                `).join('');

            let menuHTML = menu.length === 0 ?
                '<div style="text-align:center;color:#7a6e86;padding:20px;"><i class="fas fa-utensils"></i><br />No menu items available</div>' :
                menu.map(item => `
                    <div class="menu-item" key="${item.id}">
                        <div>
                            <div class="name">${item.emoji} ${item.name}</div>
                            <div class="price">$${item.price.toFixed(2)}</div>
                        </div>
                        <button class="add-btn" onclick="addToCart(${item.id})">
                            <i class="fas fa-plus"></i> Add
                        </button>
                    </div>
                `).join('');

            let girlsHTML = deliveryGirls.length === 0 ?
                '<div style="color:#7a6e86;padding:8px 0;">No delivery girls added yet</div>' :
                deliveryGirls.map(g => `
                    <span class="delivery-girl-tag" key="${g}">
                        <i class="fas fa-female"></i> ${g}
                        <span class="remove" onclick="removeGirl('${g}')">
                            <i class="fas fa-times"></i>
                        </span>
                    </span>
                `).join('');

            const mapSrc = `https://www.google.com/maps/embed/v1/place?key=AIzaSyC0X7LOV5Vqk7t7mGzN9eK8zP5yH9Qw0Jc&q=${encodeURIComponent(customerLocation)}`;

            container.innerHTML = `
                <!-- Menu Section -->
                <div class="card">
                    <div class="section-title">
                        <i class="fas fa-list-ul"></i> Today's Menu
                    </div>
                    ${menuHTML}
                </div>

                <!-- Order Summary -->
                <div class="order-summary">
                    <div class="section-title">
                        <i class="fas fa-shopping-bag"></i> Your Order
                    </div>
                    ${cartHTML}
                    <div class="order-row order-total">
                        <span>Total</span>
                        <span>$${totalPrice.toFixed(2)}</span>
                    </div>
                    <button class="action-btn" onclick="placeOrder()">
                        <i class="fas fa-motorcycle"></i> Place Order · Cash
                    </button>
                    ${orderPlaced ? '<div class="success-message"><i class="fas fa-check-circle"></i> Order placed! Delivery on the way.</div>' : ''}
                </div>

                <!-- Map Section -->
                <div class="card">
                    <div class="section-title">
                        <i class="fas fa-map-pin"></i> Delivery Location
                    </div>
                    <div class="map-container">
                        <iframe src="${mapSrc}" loading="lazy" title="Delivery Map"></iframe>
                    </div>
                    <div style="font-size:13px;margin-top:6px;">
                        <i class="fas fa-location-dot" style="color:#6c2b8a;"></i> Customer: ${customerLocation}
                    </div>
                </div>

                <!-- Admin Panel -->
                <div class="admin-panel">
                    <div class="section-title">
                        <i class="fas fa-user-gear"></i> Admin · Delivery Girls
                    </div>
                    <div class="admin-input-group">
                        <input id="newGirlInput" placeholder="Enter delivery girl name" onkeypress="if(event.key==='Enter') addDeliveryGirl()" />
                        <button onclick="addDeliveryGirl()">
                            <i class="fas fa-plus"></i> Add
                        </button>
                    </div>
                    <div>
                        ${girlsHTML}
                    </div>
                </div>
            `;
        }

        // Global functions
        window.addToCart = function(id) {
            const item = menu.find(i => i.id === id);
            if (!item) return;
            const existing = cart.find(i => i.id === id);
            if (existing) {
                cart = cart.map(i => i.id === id ? { ...i, qty: i.qty + 1 } : i);
            } else {
                cart.push({ ...item, qty: 1 });
            }
            render();
        };

        window.removeFromCart = function(id) {
            const existing = cart.find(i => i.id === id);
            if (existing && existing.qty > 1) {
                cart = cart.map(i => i.id === id ? { ...i, qty: i.qty - 1 } : i);
            } else {
                cart = cart.filter(i => i.id !== id);
            }
            render();
        };

        window.placeOrder = async function() {
            if (cart.length === 0) {
                alert('Please add items to your order');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('orders')
                    .insert({
                        items: cart,
                        total: cart.reduce((acc, i) => acc + i.price * i.qty, 0),
                        customer_location: customerLocation,
                        status: 'pending'
                    })
                    .select();

                if (error) throw error;

                orderPlaced = true;
                cart = [];
                render();
                setTimeout(() => {
                    orderPlaced = false;
                    render();
                }, 6000);
                alert('✅ Order placed successfully! A delivery girl will arrive soon.');
            } catch (error) {
                alert('Failed to place order: ' + error.message);
            }
        };

        window.addDeliveryGirl = async function() {
            const input = document.getElementById('newGirlInput');
            const name = input.value.trim();
            if (!name) {
                alert('Please enter a delivery girl name');
                return;
            }

            try {
                // Check if exists
                const { data: existing } = await supabase
                    .from('delivery_girls')
                    .select('name')
                    .eq('name', name)
                    .single();

                if (existing) {
                    alert('Delivery girl already exists');
                    return;
                }

                const { error } = await supabase
                    .from('delivery_girls')
                    .insert({ name: name });

                if (error) throw error;

                // Refresh list
                const { data: girlsData } = await supabase
                    .from('delivery_girls')
                    .select('name')
                    .order('name');

                deliveryGirls = girlsData.map(g => g.name);
                input.value = '';
                render();
                alert('✅ Delivery girl added successfully!');
            } catch (error) {
                alert('Failed to add delivery girl: ' + error.message);
            }
        };

        window.removeGirl = async function(name) {
            if (!confirm(`Remove ${name} from delivery girls?`)) return;

            try {
                const { error } = await supabase
                    .from('delivery_girls')
                    .delete()
                    .eq('name', name);

                if (error) throw error;

                const { data: girlsData } = await supabase
                    .from('delivery_girls')
                    .select('name')
                    .order('name');

                deliveryGirls = girlsData.map(g => g.name);
                render();
                alert('✅ Delivery girl removed successfully!');
            } catch (error) {
                alert('Failed to remove delivery girl: ' + error.message);
            }
        };

        // Initial render
        render();
    }

    // Start the app
    loadSupabaseAndRun();
</script>
</body>
</html>
